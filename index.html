<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="theme-color" content="#fbcfe8"/>
  <link rel="manifest" href="manifest.json"/>

  <title>Mickey's Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fdf2f8; }
    ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 10px; }
  </style>
</head>

<body class="bg-pink-50 text-gray-800 min-h-screen font-sans pb-10">

<div class="max-w-lg mx-auto p-4">
  <h1 class="text-3xl font-extrabold text-center text-pink-500 mb-6 drop-shadow-sm">
    🐱 Mickey's Tracker 🐾
  </h1>

  <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-2xl shadow-sm border border-pink-100">
    <button onclick="prevMonth()" class="bg-pink-100 hover:bg-pink-200 text-pink-600 px-4 py-2 rounded-xl text-lg transition font-bold">⬅</button>
    <h2 id="monthTitle" class="text-lg font-extrabold text-pink-600 uppercase tracking-wide"></h2>
    <button onclick="nextMonth()" class="bg-pink-100 hover:bg-pink-200 text-pink-600 px-4 py-2 rounded-xl text-lg transition font-bold">➡</button>
  </div>

  <div class="grid grid-cols-7 text-center text-xs font-bold text-pink-400 mb-2">
    <div>SUN</div><div>MON</div><div>TUE</div>
    <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
  </div>

  <div id="calendar" class="grid grid-cols-7 gap-2 mb-6"></div>

  <div class="bg-white p-5 rounded-2xl shadow-md border border-pink-200 mb-6">
    <h3 class="text-xl text-pink-500 font-bold mb-4 text-center">Monthly Summary</h3>
    
    <div class="grid grid-cols-2 gap-4 text-sm mb-4">
      <div class="bg-pink-50 p-3 rounded-xl border border-pink-100">
        <p class="font-bold text-gray-600">Total Usage</p>
        <p>🐟 Food: <span id="totalFood" class="font-bold text-pink-500">0</span></p>
        <p>🪨 Litter: <span id="totalLitter" class="font-bold text-pink-500">0</span></p>
        <p>🍗 Chicken: <span id="totalChicken" class="font-bold text-pink-500">0</span></p>
      </div>
      <div class="bg-pink-50 p-3 rounded-xl border border-pink-100">
        <p class="font-bold text-gray-600">Total Expenses</p>
        <p>🐟 Food: <span class="font-bold text-rose-500">৳<span id="costFood">0</span></span></p>
        <p>🪨 Litter: <span class="font-bold text-rose-500">৳<span id="costLitter">0</span></span></p>
        <p>🍗 Chicken: <span class="font-bold text-rose-500">৳<span id="costChicken">0</span></span></p>
      </div>
    </div>
    
    <div class="text-center bg-rose-100 p-3 rounded-xl font-bold text-rose-600 text-lg">
      Total Spent: ৳<span id="totalSpent">0</span>
    </div>
  </div>

  <div class="bg-white p-4 rounded-2xl shadow-md border border-pink-200 space-y-6">
    <div>
      <h4 class="text-center font-bold text-pink-400 mb-2">Usage Tracking</h4>
      <canvas id="usageChart" height="200"></canvas>
    </div>
    <hr class="border-pink-100">
    <div>
      <h4 class="text-center font-bold text-rose-400 mb-2">Expense Tracking (৳)</h4>
      <canvas id="costChart" height="200"></canvas>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 bg-pink-900 bg-opacity-40 hidden items-center justify-center backdrop-blur-sm px-4 z-50">
  <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl border-4 border-pink-100">
    <div class="flex justify-between items-center mb-5">
      <h3 class="text-xl font-extrabold text-pink-500">Update Mickey's Day</h3>
      <p id="selectedDate" class="text-sm font-bold text-pink-300"></p>
    </div>
    
    <div class="space-y-4">
      <div class="bg-pink-50 p-3 rounded-xl">
        <h4 class="text-sm font-bold text-gray-700 mb-2">🐟 Cat Food</h4>
        <div class="flex gap-2">
          <input type="number" id="foodInput" placeholder="Portions" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 text-center"/>
          <input type="number" id="foodCostInput" placeholder="Cost (৳)" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-rose-400 text-center"/>
        </div>
      </div>
      
      <div class="bg-pink-50 p-3 rounded-xl">
        <h4 class="text-sm font-bold text-gray-700 mb-2">🪨 Cat Litter</h4>
        <div class="flex gap-2">
          <input type="number" id="litterInput" placeholder="Changes" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 text-center"/>
          <input type="number" id="litterCostInput" placeholder="Cost (৳)" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-rose-400 text-center"/>
        </div>
      </div>

      <div class="bg-pink-50 p-3 rounded-xl">
        <h4 class="text-sm font-bold text-gray-700 mb-2">🍗 Chicken</h4>
        <div class="flex gap-2">
          <input type="number" id="chickenInput" placeholder="Meals" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-400 text-center"/>
          <input type="number" id="chickenCostInput" placeholder="Cost (৳)" min="0" class="w-1/2 p-2 rounded-lg border border-pink-200 focus:outline-none focus:ring-2 focus:ring-rose-400 text-center"/>
        </div>
      </div>
    </div>

    <div class="flex justify-between mt-6 gap-3">
      <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-4 py-3 rounded-xl w-1/2 transition">Cancel</button>
      <button onclick="saveData()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold px-4 py-3 rounded-xl w-1/2 transition shadow-lg shadow-pink-300">Save</button>
    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let data = JSON.parse(localStorage.getItem('mickeyTrackerDataV2')) || {}; 
let selectedKey = '';

// Chart Instances
let usageChart = null;
let costChart = null;

function renderCalendar() {
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  document.getElementById('monthTitle').innerText =
    currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

  // Empty slots
  for (let i = 0; i < firstDay; i++) {
    calendar.innerHTML += `<div class="h-20"></div>`;
  }

  let totals = { food: 0, litter: 0, chicken: 0, costFood: 0, costLitter: 0, costChicken: 0 };

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${month + 1}-${d}`;
    const dayData = data[key] || { food: 0, litter: 0, chicken: 0, costFood: 0, costLitter: 0, costChicken: 0 };
    
    // Calculate Monthly Totals
    totals.food += dayData.food || 0;
    totals.litter += dayData.litter || 0;
    totals.chicken += dayData.chicken || 0;
    totals.costFood += dayData.costFood || 0;
    totals.costLitter += dayData.costLitter || 0;
    totals.costChicken += dayData.costChicken || 0;

    const hasData = dayData.food > 0 || dayData.litter > 0 || dayData.chicken > 0;
    const bgColor = hasData ? 'bg-pink-100 border-pink-300 shadow-sm' : 'bg-white border-pink-100';
    const isToday = new Date().toDateString() === new Date(year, month, d).toDateString() ? 'ring-4 ring-pink-400' : '';

    calendar.innerHTML += `
      <div onclick="openModal('${key}')"
           class="h-20 flex flex-col p-1.5 rounded-xl border ${bgColor} ${isToday} cursor-pointer hover:bg-pink-50 active:scale-95 transition overflow-hidden">
        <div class="text-sm font-extrabold text-pink-600 mb-1">${d}</div>
        <div class="text-[10px] space-y-0.5 mt-auto font-bold">
          ${dayData.food > 0 ? `<div class="text-blue-500">🐟 ${dayData.food}</div>` : ''}
          ${dayData.litter > 0 ? `<div class="text-gray-500">🪨 ${dayData.litter}</div>` : ''}
          ${dayData.chicken > 0 ? `<div class="text-red-500">🍗 ${dayData.chicken}</div>` : ''}
        </div>
      </div>
    `;
  }

  updateSummaryAndCharts(totals);
}

function openModal(key) {
  selectedKey = key;
  const dayData = data[key] || { food: 0, litter: 0, chicken: 0, costFood: 0, costLitter: 0, costChicken: 0 };
  
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
  document.getElementById('selectedDate').innerText = key;
  
  document.getElementById('foodInput').value = dayData.food || '';
  document.getElementById('foodCostInput').value = dayData.costFood || '';
  
  document.getElementById('litterInput').value = dayData.litter || '';
  document.getElementById('litterCostInput').value = dayData.costLitter || '';
  
  document.getElementById('chickenInput').value = dayData.chicken || '';
  document.getElementById('chickenCostInput').value = dayData.costChicken || '';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('modal').classList.remove('flex');
}

function saveData() {
  const food = parseInt(document.getElementById('foodInput').value) || 0;
  const costFood = parseInt(document.getElementById('foodCostInput').value) || 0;
  
  const litter = parseInt(document.getElementById('litterInput').value) || 0;
  const costLitter = parseInt(document.getElementById('litterCostInput').value) || 0;
  
  const chicken = parseInt(document.getElementById('chickenInput').value) || 0;
  const costChicken = parseInt(document.getElementById('chickenCostInput').value) || 0;

  if (food < 0 || litter < 0 || chicken < 0 || costFood < 0 || costLitter < 0 || costChicken < 0) {
    alert('Values cannot be negative!');
    return;
  }

  data[selectedKey] = { food, litter, chicken, costFood, costLitter, costChicken };
  localStorage.setItem('mickeyTrackerDataV2', JSON.stringify(data));

  closeModal();
  renderCalendar();
}

function updateSummaryAndCharts(totals) {
  // Update Text Summary
  document.getElementById('totalFood').innerText = totals.food;
  document.getElementById('totalLitter').innerText = totals.litter;
  document.getElementById('totalChicken').innerText = totals.chicken;

  document.getElementById('costFood').innerText = totals.costFood;
  document.getElementById('costLitter').innerText = totals.costLitter;
  document.getElementById('costChicken').innerText = totals.costChicken;
  
  document.getElementById('totalSpent').innerText = totals.costFood + totals.costLitter + totals.costChicken;

  // Render Usage Chart
  const usageCtx = document.getElementById('usageChart').getContext('2d');
  if (usageChart) usageChart.destroy();
  usageChart = new Chart(usageCtx, {
    type: 'bar',
    data: {
      labels: ['Food (Portions)', 'Litter (Changes)', 'Chicken (Meals)'],
      datasets: [{
        label: 'Monthly Usage',
        data: [totals.food, totals.litter, totals.chicken],
        backgroundColor: ['#60a5fa', '#9ca3af', '#f87171'],
        borderRadius: 5
      }]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
  });

  // Render Cost Chart
  const costCtx = document.getElementById('costChart').getContext('2d');
  if (costChart) costChart.destroy();
  costChart = new Chart(costCtx, {
    type: 'bar',
    data: {
      labels: ['Food Cost', 'Litter Cost', 'Chicken Cost'],
      datasets: [{
        label: 'Monthly Expenses (৳)',
        data: [totals.costFood, totals.costLitter, totals.costChicken],
        backgroundColor: ['#f43f5e', '#fb7185', '#fda4af'],
        borderRadius: 5
      }]
    },
    options: { responsive: true, scales: { y: { beginAtZero: true } } }
  });
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW Registered'))
      .catch(err => console.log('SW failed:', err));
  });
}

// Init
renderCalendar();
</script>

</body>
</html>
